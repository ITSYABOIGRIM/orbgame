<!DOCTYPE html>

<html lang="en" style="background:#04020d;color:#ede9f8">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Orb Clicker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#04020d;}
:root{--bg:#04020d;--panel:rgba(12,6,30,.98);--border:rgba(167,139,250,.22);--muted:#6b5f8a;--gold:#fbbf24;--gold-dim:#78350f;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);--o1:#c4b5fd;--o2:#7c3aed;--o3:#2e1065;--o4:#0d0520;--og1:rgba(124,58,237,.6);--og2:rgba(124,58,237,.25);--oglow:#7c3aed;--oshine:rgba(255,255,255,.45);--oring:rgba(167,139,250,.22);--oring2:rgba(167,139,250,.1);--pulse-col:rgba(124,58,237,.55);--core:#a78bfa;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#ede9f8;display:flex;width:100%;height:100%;overflow:hidden;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite alternate;opacity:0;}
@keyframes twinkle{from{opacity:.04}to{opacity:var(--mo,.6)}}
#main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(8px,1.8vh,20px);padding:calc(var(--sat)+8px) 56px calc(var(--sab)+8px) 8px;}
#prestige-btn{display:none;padding:7px 20px;border-radius:10px;background:linear-gradient(135deg,#f59e0b,#b45309);border:none;cursor:pointer;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:700;font-size:.72rem;transition:transform .15s;box-shadow:0 4px 18px rgba(245,158,11,.4);}
#prestige-btn:hover{transform:scale(1.05);}
#counter-wrap{text-align:center;pointer-events:none;}
#orb-count{font-family:Georgia,serif;font-size:clamp(1.5rem,3.5vw,2.8rem);font-weight:700;color:#fff;text-shadow:0 0 24px var(--core),0 0 70px var(--oglow);letter-spacing:.04em;transition:transform .06s;}
#orb-count.pop{transform:scale(1.1);}
#stats-row{display:flex;gap:clamp(7px,1.3vw,18px);justify-content:center;margin-top:5px;font-size:clamp(.55rem,.76vw,.72rem);color:var(--muted);letter-spacing:.07em;text-transform:uppercase;flex-wrap:wrap;}
.stat-item span{color:var(--core);font-weight:600;}
#multi-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;}
.multi-btn{padding:3px 10px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.64rem;font-weight:600;color:var(--muted);transition:all .15s;}
.multi-btn.active,.multi-btn:hover{background:rgba(124,58,237,.25);border-color:var(--core);color:var(--core);}
#orb-area{position:relative;display:flex;align-items:center;justify-content:center;gap:20px;flex-shrink:0;touch-action:manipulation;}
#orb-btn{position:relative;width:clamp(130px,23vmin,250px);height:clamp(130px,23vmin,250px);border-radius:50%;border:none;background:none;cursor:pointer;outline:none;transition:transform .08s;z-index:2;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#orb-btn:active{transform:scale(.88)!important;}
#orb-btn2{position:relative;width:clamp(65px,11vmin,120px);height:clamp(65px,11vmin,120px);border-radius:50%;border:none;background:none;cursor:pointer;outline:none;transition:transform .08s;z-index:2;display:none;}
#orb-btn2:active{transform:scale(.88)!important;}
.orb-layer{position:absolute;inset:0;border-radius:50%;}
.orb-bg{background:radial-gradient(circle at 34% 28%,var(--o1),var(--o2) 44%,var(--o3) 72%,var(--o4));box-shadow:0 0 50px 12px var(--og1),0 0 120px 40px var(--og2),inset 0 -14px 34px rgba(0,0,0,.45);transition:background .6s,box-shadow .6s;}
.orb-shine{background:radial-gradient(circle at 32% 26%,var(--oshine) 0%,rgba(255,255,255,.07) 44%,transparent 68%);}
.orb-pulse{background:transparent;animation:orb-pulse 2.4s ease-out infinite;}
@keyframes orb-pulse{0%{box-shadow:0 0 0 0 var(--pulse-col)}70%{box-shadow:0 0 0 28px rgba(0,0,0,0)}100%{box-shadow:0 0 0 0 rgba(0,0,0,0)}}
.orb-ring{inset:-9px;border-radius:50%;background:transparent;border:1.5px solid var(--oring);animation:spin-r 12s linear infinite;}
.orb-ring2{inset:-20px;border-radius:50%;background:transparent;border:1px dashed var(--oring2);animation:spin-r 24s linear infinite reverse;}
.orb-ring3{inset:-32px;border-radius:50%;background:transparent;border:.5px solid var(--oring2);animation:spin-r 40s linear infinite;opacity:.5;}
@keyframes spin-r{to{transform:rotate(360deg)}}
body.skin-rainbow .orb-bg{background:conic-gradient(#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#a78bfa,#ff6b6b);animation:rainbow-spin 4s linear infinite;}
@keyframes rainbow-spin{to{transform:rotate(360deg)}}
#acc-layer{position:absolute;inset:-60px;pointer-events:none;z-index:1;}
.acc-wing-l,.acc-wing-r{position:absolute;top:50%;}
.acc-wing-l{width:62px;height:88px;right:calc(50% + 50px);border-radius:60% 10% 60% 10%;background:linear-gradient(230deg,rgba(255,255,255,.7),rgba(190,215,255,.25));filter:blur(1px);animation:wfl 1.2s ease-in-out infinite alternate;transform-origin:right center;}
.acc-wing-r{width:62px;height:88px;left:calc(50% + 50px);border-radius:10% 60% 10% 60%;background:linear-gradient(310deg,rgba(255,255,255,.7),rgba(190,215,255,.25));filter:blur(1px);animation:wfr 1.2s ease-in-out infinite alternate;transform-origin:left center;}
@keyframes wfl{from{transform:translateY(-50%) rotate(-24deg) scaleY(.6)}to{transform:translateY(-50%) rotate(24deg) scaleY(1)}}
@keyframes wfr{from{transform:translateY(-50%) rotate(24deg) scaleY(.6)}to{transform:translateY(-50%) rotate(-24deg) scaleY(1)}}
.dragon-wing .acc-wing-l{background:linear-gradient(230deg,rgba(220,50,50,.8),rgba(100,0,0,.4));border-radius:60% 10% 60% 10%;box-shadow:0 0 18px rgba(200,40,40,.5);}
.dragon-wing .acc-wing-r{background:linear-gradient(310deg,rgba(220,50,50,.8),rgba(100,0,0,.4));border-radius:10% 60% 10% 60%;box-shadow:0 0 18px rgba(200,40,40,.5);}
.phoenix-wing .acc-wing-l{background:linear-gradient(230deg,rgba(255,200,50,.85),rgba(220,80,0,.5));border-radius:60% 10% 60% 10%;box-shadow:0 0 18px rgba(255,150,0,.5);}
.phoenix-wing .acc-wing-r{background:linear-gradient(310deg,rgba(255,200,50,.85),rgba(220,80,0,.5));border-radius:10% 60% 10% 60%;box-shadow:0 0 18px rgba(255,150,0,.5);}
.acc-fire-el{position:absolute;inset:-16px;border-radius:50%;animation:fire-aura 1.6s ease-in-out infinite alternate;}
@keyframes fire-aura{from{box-shadow:0 0 28px 8px rgba(255,100,0,.4)}to{box-shadow:0 0 50px 20px rgba(255,160,0,.65),0 0 100px 40px rgba(255,80,0,.3)}}
.acc-armour-el{position:absolute;inset:-7px;border-radius:50%;border:3px solid rgba(180,190,220,.55);animation:ap 3s ease-in-out infinite alternate;}
@keyframes ap{from{box-shadow:0 0 12px rgba(150,160,200,.3)}to{box-shadow:0 0 28px rgba(200,215,255,.65)}}
.acc-armour-el::before{content:"";position:absolute;inset:-7px;border-radius:50%;border:2px dashed rgba(180,200,255,.3);animation:spin-r 20s linear infinite;}
.acc-shadow-el{position:absolute;inset:-14px;border-radius:50%;background:radial-gradient(circle,transparent 44%,rgba(20,0,40,.5) 70%,rgba(0,0,0,.7) 100%);animation:shadow-swirl 8s linear infinite;}
@keyframes shadow-swirl{to{transform:rotate(360deg)}}
@keyframes crown-bob{from{transform:translateX(-50%) translateY(0)}to{transform:translateX(-50%) translateY(-8px)}}
@keyframes halo-glow{from{box-shadow:0 0 10px rgba(255,240,100,.5)}to{box-shadow:0 0 24px rgba(255,240,100,.95)}}
@keyframes spike-pulse{from{opacity:.45;height:26px}to{opacity:1;height:42px}}
.float-label{position:fixed;font-family:Georgia,serif;font-size:clamp(.8rem,1.2vw,1rem);font-weight:700;color:var(--core);text-shadow:0 0 14px var(--oglow);pointer-events:none;z-index:999;animation:float-up .9s ease-out forwards;}
@keyframes float-up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
#combo-wrap{font-family:Georgia,serif;font-size:clamp(.66rem,.88vw,.82rem);color:var(--gold);letter-spacing:.08em;min-height:1.2em;pointer-events:none;}
#save-btn{position:fixed;top:calc(var(--sat)+12px);left:calc(var(--sal)+10px);width:38px;height:38px;border-radius:9px;background:rgba(12,6,30,.9);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:1rem;z-index:100;transition:all .15s;display:flex;align-items:center;justify-content:center;}
#save-btn:hover{border-color:var(--core);color:var(--core);}
#shop-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);width:46px;background:var(--panel);border:1.5px solid var(--border);border-right:none;border-radius:12px 0 0 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 7px;z-index:100;box-shadow:-4px 0 18px rgba(124,58,237,.2);}
#shop-tab:hover{border-color:var(--core);}
#shop-badge{position:absolute;top:-6px;left:-6px;background:var(--gold);color:#000;font-size:.54rem;font-weight:700;border-radius:20px;padding:1px 5px;display:none;}
#shop-panel{position:fixed;right:-500px;top:0;bottom:0;width:min(460px,90vw);background:var(--panel);border-left:1.5px solid var(--border);z-index:150;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.6);}
#shop-panel.open{right:0;}
#shop-header{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat)+10px) 14px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
#shop-header h2{font-family:Georgia,serif;font-size:1rem;letter-spacing:.1em;color:#fff;text-shadow:0 0 20px var(--core);}
#shop-orbs{font-size:.72rem;color:var(--gold);font-weight:600;}
#shop-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.3rem;padding:4px 8px;min-width:38px;min-height:38px;display:flex;align-items:center;justify-content:center;}
#shop-close:hover{color:#fff;}
#shop-timer{padding:5px 14px;font-family:Georgia,serif;font-size:.6rem;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-shrink:0;}
#shop-timer-dot{width:6px;height:6px;border-radius:50%;background:var(--core);animation:t-pulse 2s ease-in-out infinite alternate;}
@keyframes t-pulse{from{opacity:.3}to{opacity:1}}
#qty-row{display:flex;gap:4px;padding:7px 12px 6px;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;}
#qty-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-right:2px;flex-shrink:0;}
.qty-btn{flex:1;padding:5px 2px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.62rem;font-weight:600;color:var(--muted);transition:all .15s;text-align:center;}
.qty-btn.active,.qty-btn:hover{background:rgba(124,58,237,.25);border-color:var(--core);color:var(--core);}
#shop-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#shop-tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:8px 7px;background:none;border:none;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.6rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;min-width:38px;}
.tab-btn.active{color:var(--core);border-bottom-color:var(--core);}
#shop-items{overflow-y:auto;padding:9px 10px;display:flex;flex-direction:column;gap:7px;-webkit-overflow-scrolling:touch;flex:1;}
#shop-items::-webkit-scrollbar{width:3px;}
#shop-items::-webkit-scrollbar-thumb{background:rgba(124,58,237,.5);border-radius:3px;}
.shop-section-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);padding:5px 2px 2px;font-weight:600;}
.shop-item{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px;transition:border-color .2s,background .2s;}
.shop-item.buyable{cursor:pointer;}.shop-item.buyable:hover,.shop-item.buyable:active{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.07);}
.shop-item.disabled{opacity:.35;}.shop-item.maxed{opacity:.46;}.shop-item.equipped{border-color:var(--core);background:rgba(124,58,237,.09);}
.item-icon{font-size:1.4rem;width:30px;text-align:center;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-family:Georgia,serif;font-size:.74rem;color:#fff;margin-bottom:1px;}
.item-desc{font-size:.61rem;color:var(--muted);line-height:1.3;}
.item-badge{font-size:.58rem;color:var(--core);margin-top:1px;}
.item-right{flex-shrink:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.cost-num{font-family:Georgia,serif;font-size:.78rem;font-weight:700;color:var(--gold);}
.cost-label{font-size:.54rem;color:var(--gold-dim);}
.buy-btn{padding:4px 10px;border-radius:6px;background:linear-gradient(135deg,var(--oglow),#4c1d95);border:none;color:#fff;font-size:.61rem;font-weight:600;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;transition:opacity .15s,transform .1s;min-height:26px;min-width:44px;}
.buy-btn:hover:not(:disabled){opacity:.85;transform:scale(1.05);}.buy-btn:disabled{opacity:.25;cursor:not-allowed;}
.buy-btn.eq{background:linear-gradient(135deg,#374151,#1f2937);}.buy-btn.eq.on{background:linear-gradient(135deg,var(--oglow),#4c1d95);}
.skin-preview{width:28px;height:28px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.15);}
.ach-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:9px;padding:8px 10px;display:flex;align-items:center;gap:8px;}
.ach-item.unlocked{border-color:rgba(167,139,250,.4);background:rgba(124,58,237,.07);}
.ach-item.locked{opacity:.3;}
.ach-emoji{font-size:1.4rem;width:28px;text-align:center;flex-shrink:0;}
.ach-info{flex:1;}
.ach-name{font-family:Georgia,serif;font-size:.72rem;color:#fff;}
.ach-desc{font-size:.6rem;color:var(--muted);margin-top:1px;}
.ach-cat{font-size:.54rem;color:var(--core);text-transform:uppercase;letter-spacing:.07em;margin-top:1px;}
#event-overlay{position:fixed;inset:0;z-index:800;display:none;align-items:center;justify-content:center;}
#event-overlay.open{display:flex;}
#fire-bg{position:absolute;inset:0;background:linear-gradient(180deg,#000 0%,#1a0000 30%,#7f1d1d 70%,#dc2626 100%);opacity:0;transition:opacity .8s;}
.flame{position:absolute;bottom:0;animation:flame-rise var(--fd,3s) ease-in-out infinite;}
.flame::before{content:"F525";font-size:var(--fs,3rem);}
@keyframes flame-rise{0%{transform:translateY(0);opacity:.9}50%{transform:translateY(-40vh) scaleX(1.3);opacity:.7}100%{transform:translateY(-80vh) scaleX(.6);opacity:0}}
#event-card{position:relative;z-index:2;background:rgba(8,4,20,.97);border:2px solid var(--border);border-radius:20px;padding:20px;max-width:420px;width:92vw;text-align:center;box-shadow:0 0 80px rgba(124,58,237,.3);animation:panel-in .3s cubic-bezier(.34,1.56,.64,1);max-height:88dvh;overflow-y:auto;}
#event-card h2{font-family:Georgia,serif;font-size:1.15rem;margin-bottom:6px;}
#event-card p{font-size:.76rem;color:var(--muted);line-height:1.5;margin-bottom:10px;white-space:pre-line;}
.evt-icon{font-size:2.6rem;margin-bottom:6px;display:block;animation:evt-bounce 1s ease-in-out infinite alternate;}
@keyframes evt-bounce{from{transform:scale(1)}to{transform:scale(1.1)}}
.evt-btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:700;font-size:.78rem;transition:transform .12s;margin:4px;}
.evt-btn:hover:not(:disabled){transform:scale(1.05);}.evt-btn:disabled{opacity:.34;cursor:not-allowed;}
.evt-btn.green{background:linear-gradient(135deg,#16a34a,#14532d);color:#fff;}
.evt-btn.red{background:linear-gradient(135deg,#dc2626,#7f1d1d);color:#fff;}
.evt-btn.gold{background:linear-gradient(135deg,#f59e0b,#92400e);color:#fff;}
.evt-btn.blue{background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;}
.evt-btn.grey{background:linear-gradient(135deg,#374151,#111827);color:#fff;}
.evt-btn.purple{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:#fff;}
#dice-num{font-family:Georgia,serif;font-size:2rem;font-weight:700;color:#ef4444;text-shadow:0 0 20px rgba(239,68,68,.7);min-height:52px;display:flex;align-items:center;justify-content:center;}
.orb-bubble{position:fixed;border-radius:50%;cursor:pointer;z-index:810;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:.62rem;font-weight:700;color:#fff;text-shadow:0 0 6px rgba(0,0,0,.9);border:2px solid rgba(255,255,255,.3);animation:bubble-float var(--bf,3s) linear forwards;box-shadow:0 0 20px var(--bc,rgba(167,139,250,.6));}
@keyframes bubble-float{0%{transform:translateY(0) scale(1);opacity:1}85%{opacity:.9}100%{transform:translateY(-95vh) scale(.6);opacity:0}}
#dungeon-overlay{position:fixed;inset:0;z-index:900;display:none;flex-direction:column;background:linear-gradient(180deg,#0a0005 0%,#1a0020 50%,#0d0010 100%);}
#dungeon-overlay.open{display:flex;}
#dungeon-bg-art{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.dungeon-pillar{position:absolute;bottom:0;width:26px;background:linear-gradient(180deg,#2d1a4a,#1a0a2e);border:1px solid rgba(167,139,250,.1);}
.dungeon-torch{position:absolute;font-size:1.2rem;animation:torch-flicker 1.5s ease-in-out infinite alternate;}
@keyframes torch-flicker{from{filter:brightness(1)}to{filter:brightness(1.6) drop-shadow(0 0 8px orange)}}
#dungeon-content{position:relative;z-index:2;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#boss-scene{padding:12px;display:flex;flex-direction:column;align-items:center;gap:9px;}
.boss-name{font-family:Georgia,serif;font-size:1.15rem;font-weight:700;text-align:center;}
.boss-emoji{font-size:4.2rem;animation:boss-idle 2s ease-in-out infinite alternate;filter:drop-shadow(0 0 16px currentColor);}
@keyframes boss-idle{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.boss-emoji.shake{animation:boss-hit .35s ease-in-out;}
@keyframes boss-hit{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}}
.hp-bar-wrap{width:100%;max-width:320px;}
.hp-label{display:flex;justify-content:space-between;font-size:.64rem;color:var(--muted);margin-bottom:2px;font-family:Georgia,serif;}
.hp-bar-bg{height:13px;background:rgba(255,255,255,.07);border-radius:7px;overflow:hidden;}
.hp-bar-fill{height:100%;border-radius:7px;transition:width .4s;}
.hp-bar-fill.player{background:linear-gradient(90deg,#16a34a,#22c55e);}
.hp-bar-fill.boss-c{transition:width .4s;}
#battle-log{width:100%;max-width:320px;background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.64rem;color:var(--muted);min-height:52px;max-height:84px;overflow-y:auto;line-height:1.6;}
#battle-log .hit{color:#f87171;}#battle-log .win{color:#a3e635;}#battle-log .sp{color:var(--gold);}#battle-log .blk{color:#7dd3fc;}#battle-log .heal{color:#4ade80;}
#battle-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 12px 12px;width:100%;max-width:320px;}
.battle-btn{padding:12px 8px;border-radius:10px;border:none;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:700;font-size:.76rem;transition:transform .12s,opacity .15s;line-height:1.3;}
.battle-btn:hover:not(:disabled){transform:scale(1.05);}.battle-btn:disabled{opacity:.28;cursor:not-allowed;}
#equip-shop{padding:11px;display:flex;flex-direction:column;gap:8px;}
#equip-shop h3{font-family:Georgia,serif;font-size:.92rem;color:var(--core);text-align:center;}
.equip-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:9px;padding:8px 10px;display:flex;align-items:center;gap:8px;}
.equip-item.owned{border-color:var(--core);cursor:default;}.equip-item.can-buy{cursor:pointer;}.equip-item.cant-afford{opacity:.3;}
.equip-icon{font-size:1.3rem;width:28px;text-align:center;}

#player-stats-panel{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin:0 11px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.pstat{text-align:center;}.pstat-val{font-family:Georgia,serif;font-size:.9rem;font-weight:700;color:#fff;}.pstat-lbl{font-size:.53rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}

#save-code-area{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:8px;padding:8px;font-family:monospace;font-size:.6rem;color:var(--core);resize:none;outline:none;height:68px;margin-bottom:9px;}
@keyframes panel-in{from{opacity:0;transform:scale(.92) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
#toast{position:fixed;bottom:calc(var(--sab)+18px);left:50%;transform:translateX(-50%);background:rgba(124,58,237,.94);border:1px solid var(--core);border-radius:10px;padding:8px 18px;font-size:.72rem;font-weight:600;color:#fff;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:92vw;text-align:center;}

// helpers
function fmt(n){n=Math.floor(n);if(n>=1e15)return(n/1e15).toFixed(2)+“Qa”;if(n>=1e12)return(n/1e12).toFixed(2)+“T”;if(n>=1e9)return(n/1e9).toFixed(2)+“B”;if(n>=1e6)return(n/1e6).toFixed(2)+“M”;if(n>=1e3)return(n/1e3).toFixed(1)+“K”;return n.toString();}
function gcost(g){return Math.ceil(g.base*Math.pow(g.g,S.gen[g.id]||0));}
function hasReq(x){return!x.req||(S.upg[x.req]||0)>0||(S.spec[x.req]||0)>0;}
function ecp(){return Math.round(S.opc*(S.cMul||1)*(S.gMul||1)*S.pMul);}
function epsVal(){return S.ops*(S.psMul||1)*(S.gMul||1)*S.pMul;}
function recalcPS(){let p=0;GEN.forEach(g=>p+=(S.gen[g.id]||0)*g.ps);S.ops=p;}
function addOrbs(n){S.orbs+=n;S.totalOrbs+=n;S.allTime+=n;}
function genCostQty(g,q){let t=0,o=S.gen[g.id]||0;for(let i=0;i<q;i++)t+=Math.ceil(g.base*Math.pow(g.g,o+i));return t;}
function upgCostQty(u,q){let t=0,o=S.upg[u.id]||0;for(let i=0;i<q;i++){if(o+i>=u.max)break;t+=u.c;}return t;}

function unlockAch(id){if(S.achievements.includes(id))return;S.achievements.push(id);const a=ACHIEVEMENTS.find(x=>x.id===id);if(a)showMilestone(a.e+” “+a.n+” — “+a.d);}
function checkAchs(){
[[100,“orb100”],[1000,“orb1k”],[10000,“orb10k”],[100000,“orb100k”],[1e6,“orb1m”],[1e8,“orb100m”],[1e9,“orb1b”],[1e12,“orb1t”]].forEach(([t,id])=>{if(S.allTime>=t)unlockAch(id);});
if(S.dualOrbUnlocked)unlockAch(“dual_orb”);
if(S.pLvl>=1)unlockAch(“prestige1”);if(S.pLvl>=6)unlockAch(“prestige6”);if(S.pLvl>=12)unlockAch(“all_prestige”);
if(S.bossesDefeated>=1)unlockAch(“first_boss”);if(S.bossesDefeated>=5)unlockAch(“boss5”);if(S.bossesDefeated>=10)unlockAch(“boss10”);if(S.bossesDefeated>=12)unlockAch(“beat_devil”);
// Ch2 combat
if(S.pLvl>=13)unlockAch(“ch2_start”);
const ch2bd=Math.max(0,S.bossesDefeated-12);
if(ch2bd>=1)unlockAch(“ch2_boss1”);
if(ch2bd>=5)unlockAch(“ch2_boss5”);
if(ch2bd>=10)unlockAch(“ch2_boss10”);
if(ch2bd>=12)unlockAch(“ch2_boss12”);
if(S.chapter2Done)unlockAch(“ch2_risen”);
if(S.pLvl>=13)unlockAch(“ch2_p13”);
if(S.pLvl>=16)unlockAch(“ch2_p16”);
if(S.pLvl>=20)unlockAch(“ch2_p20”);
if(S.pLvl>=24)unlockAch(“ch2_p24”);
// Ch2 progress milestones
if(S.allTime>=1e14)unlockAch(“orb100t”);
if(S.allTime>=1e15)unlockAch(“orb1q”);
if(S.allTime>=1e16)unlockAch(“orb10q”);
if(S.allTime>=1e18)unlockAch(“orb1qi”);
if(S.allTime>=1e21)unlockAch(“orb1sx”);
if(GEN.some(g=>(S.gen[g.id]||0)>=10&&g.ch===2))unlockAch(“ch2_gen10”);
if(GEN.some(g=>(S.gen[g.id]||0)>=100&&g.ch===2))unlockAch(“ch2_gen100”);
if(CH2_UPG&&CH2_UPG.every(u=>(S.upg[u.id]||0)>=u.max))unlockAch(“ch2_maxupg”);
// Ch2 skins
const ch2skins=SKINS.filter(sk=>sk.bossLvl&&sk.bossLvl>12&&S.skins.includes(sk.id)).length;
if(ch2skins>=1)unlockAch(“ch2_skin1”);
if(ch2skins>=5)unlockAch(“ch2_skin5”);
if(ch2skins>=12)unlockAch(“ch2_skin12”);
if(SKINS.every(sk=>S.skins.includes(sk.id)))unlockAch(“ch2_all_ch1_skin”);
// Ch2 mastery
if(ecp()>=1000000000)unlockAch(“ch2_billion_click”);
if((S._ch2Events||0)>=5)unlockAch(“ch2_event5”);
if((S._goldenCaught||0)>=5)unlockAch(“ch2_golden5”);
if((S.combo||0)>=20)unlockAch(“ch2_combo20”);

if(S.unlockedAccs.length>=1)unlockAch(“first_acc”);if(S.accs.length>=5)unlockAch(“full_acc”);
if(GEN.some(g=>(S.gen[g.id]||0)>=10))unlockAch(“gen10”);
if(UPG.some(u=>(S.upg[u.id]||0)>=u.max))unlockAch(“max_upgrade”);
}

// click
let clickN=0,combo=0,comboT=null;

function doClick(cx,cy,mult){
let v=Math.round(ecp()*mult);if(S.multiClick>1)v*=S.multiClick;
let crit=false;if((S.critChance||0)>0&&Math.random()<S.critChance){v=Math.round(v*(S.critMul||2));crit=true;unlockAch(“crit_hit”);S._ch2Crits=(S._ch2Crits||0)+1;if(S._ch2Crits>=100)unlockAch(“ch2_crit100”);}
clickN++;if((S.quantumStack||0)>0&&clickN%10===0)v*=100*S.quantumStack;
if(S.comboOn&&mult===1){const now=Date.now();if(now-S.lastClick<600)combo=Math.min(combo+1,50);else combo=0;S.lastClick=now;if(combo>0)v=Math.round(v*(1+Math.min(combo,10)*.1));clearTimeout(comboT);comboT=setTimeout(()=>{combo=0;document.getElementById(“combo-wrap”).textContent=””;},1200);if(combo>0){document.getElementById(“combo-wrap”).textContent=“COMBO x”+(1+Math.min(combo,10)*.1).toFixed(1)+”!”;if(combo>=9)unlockAch(“combo10”);}}
addOrbs(v);updateDisplay();spawnLabel(cx,cy,v,crit);popCount();checkBadge();checkAchs();
}

// Debug helpers
function dbgSetPrestige(n){
const boss=BOSSES.find(b=>b.lvl===n);if(!boss)return;
S.pLvl=n;
let mul=1;
BOSSES.filter(b=>b.lvl<=n).forEach(b=>{mul=parseFloat((mul*b.mul*1.1).toFixed(3));});
S.pMul=mul;
S.bossesDefeated=Math.max(S.bossesDefeated,n);
S.totalOrbs=Math.max(S.totalOrbs,boss.req);
S.orbs=Math.max(S.orbs,boss.req);
checkDualOrb();checkAchs();updateDisplay();
showToast(‘Set to Prestige ‘+n+’ (’+fmt(mul)+‘x)’);
renderDebugPanel();
}
function dbgSetChapter(n){
if(n===1){
S.chapter=1;
S.chapter1Done=false;
S.chapter2Done=false;
// Reset to just before devil (P11 done)
if(S.pLvl>12){S.pLvl=11;S.bossesDefeated=11;}
updateDisplay();
showMilestone(“Switched to Chapter 1 (P”+S.pLvl+”)”);
renderDebugPanel();
} else if(n===2){
S.chapter=2;
// Make sure ch1 is marked complete and pLvl is at least 12
if(S.pLvl<12){
S.pLvl=12;
S.bossesDefeated=Math.max(S.bossesDefeated,12);
S.chapter1Done=true;
// Give enough orbs to trigger P13
S.orbs=Math.max(S.orbs,1000000000000);
S.totalOrbs=Math.max(S.totalOrbs,1000000000000);
S.allTime=Math.max(S.allTime,1000000000000);
}
unlockAch(‘ch2_start’);
updateDisplay();
showMilestone(“Switched to Chapter 2 (P”+S.pLvl+”)”);
renderDebugPanel();
}
}
function dbgMaxUpgrades(){
UPG.forEach(u=>{
let s2={…S};s2.opc=S.opc;
for(let i=(S.upg[u.id]||0);i<u.max;i++){u.fn(S);}
S.upg[u.id]=u.max;
});
recalcPS();updateDisplay();showToast(‘All upgrades maxed!’);
}
function dbgMaxGens(){
GEN.forEach(g=>{S.gen[g.id]=500;});

}
function dbgMaxSpec(){
SPEC.forEach(u=>{

S.spec[u.id]=u.max;
});
recalcPS();updateDisplay();showToast(‘All specials maxed!’);
}
function dbgMaxAll(){dbgMaxUpgrades();dbgMaxGens();dbgMaxSpec();showToast(‘Everything maxed!’);}
function dbgAllSkins(){
SKINS.forEach(sk=>{if(!S.skins.includes(sk.id))S.skins.push(sk.id);});

function dbgAllAccs(){

if(!S.accs.includes(a.id)){S.accs.push(a.id);try{a.fn();}catch(e){}}
});
checkAchs();showToast(‘All accessories equipped!’);
}
